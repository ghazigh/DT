<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 18px 24px; display: flex; gap: 14px; }
  .card {
    flex: 1; background: var(--ink-100); border: 1px solid var(--border-subtle); border-radius: var(--r-lg);
    padding: 16px; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow-md);
  }
  .head { display: flex; align-items: center; justify-content: space-between; }
  .name { font-family: var(--font-mono); font-size: 13px; color: var(--fg-primary); letter-spacing: 0.02em; }
  .status { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--signal-500); display: inline-flex; gap: 5px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.04em; }
  .num { font-size: 24px; color: var(--fg-primary); font-family: var(--font-mono); font-weight: 500; }
  .units { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); }
  .glow { border-color: rgba(0,232,154,0.3); box-shadow: 0 0 32px rgba(0,232,154,0.12), var(--shadow-md); }
</style>
</head>
<body>
  <div class="card">
    <div class="head"><span class="name">atlas-04</span><span class="status"><span class="dot"></span>LIVE</span></div>
    <div><span class="num">99.92</span><span class="units">%</span></div>
    <div class="meta">Uptime · last 30d</div>
  </div>
  <div class="card glow">
    <div class="head"><span class="name">helio-12</span><span class="status"><span class="dot"></span>LIVE</span></div>
    <div><span class="num">14.3</span><span class="units">ms</span></div>
    <div class="meta">P99 inference latency</div>
  </div>
  <div class="card">
    <div class="head"><span class="name">orbit-07</span><span class="status" style="color: var(--orbit-500);"><span class="dot"></span>TRAINING</span></div>
    <div><span class="num">62</span><span class="units">% complete</span></div>
    <div class="meta">ETA · 18 min</div>
  </div>
</body>
</html>
