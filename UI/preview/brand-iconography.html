<!doctype html>
<html>
<head>

<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 18px 24px; display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .icon { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--fg-secondary); }
  .icon svg { stroke: currentColor; fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg-tertiary); letter-spacing: 0.1em; }
  .signal { color: var(--signal-500); }
</style>
