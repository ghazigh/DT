<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 18px 24px; }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.08em; min-width: 110px; }
  .sample { color: var(--fg-primary); }
</style>
</head>
<body>
  <div class="row"><span class="meta">H1 · 40 / 600</span><span class="sample" style="font-size: 40px; font-weight: 600; letter-spacing: -0.015em;">Heading One</span></div>
  <div class="row"><span class="meta">H2 · 30 / 500</span><span class="sample" style="font-size: 30px; font-weight: 500; letter-spacing: -0.015em;">Heading Two</span></div>
  <div class="row"><span class="meta">H3 · 22 / 600</span><span class="sample" style="font-size: 22px; font-weight: 600;">Heading Three</span></div>
  <div class="row"><span class="meta">Body · 15 / 400</span><span class="sample" style="font-size: 15px; color: var(--fg-secondary);">A digital twin learns continuously from observed signals.</span></div>
  <div class="row"><span class="meta">Caption · 11</span><span class="sample" style="font-size: 11px; color: var(--fg-tertiary);">Telemetry observed at 14:02:11 UTC</span></div>
</body>
</html>
