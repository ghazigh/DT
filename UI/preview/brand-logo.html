<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 18px 24px; }
  .logos { display: flex; align-items: center; gap: 36px; color: var(--fg-primary); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 14px; }
  .signal { color: var(--signal-500); }
</style>
</head>
<body>
  <div class="logos">
    <img src="../assets/logo-mark.svg" width="56" height="56" alt="mark"/>
    <img src="../assets/logo-horizontal.svg" width="220" height="48" alt="wordmark"/>
    <div class="signal"><img src="../assets/logo-mark.svg" width="48" height="48" alt="mark on signal" style="filter: invert(54%) sepia(98%) saturate(396%) hue-rotate(108deg) brightness(102%) contrast(101%);"/></div>
    <img src="../assets/favicon.svg" width="40" height="40" alt="favicon"/>
  </div>
  <div class="lbl">— Mark · Horizontal lockup · Phosphor variant · App icon</div>
</body>
</html>
