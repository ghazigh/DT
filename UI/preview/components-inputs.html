<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 18px 24px; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; max-width: 320px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.14em; text-transform: uppercase; }
  input, select {
    background: var(--ink-100); border: 1px solid var(--border-default); border-radius: var(--r-sm);
    padding: 9px 12px; color: var(--fg-primary); font-family: var(--font-sans); font-size: 14px;
    outline: none; transition: border-color 120ms;
  }
  input:focus { border-color: var(--signal-500); box-shadow: 0 0 0 3px rgba(0,232,154,0.15); }
  .focused { border-color: var(--signal-500); box-shadow: 0 0 0 3px rgba(0,232,154,0.15); }
  .row { display: flex; gap: 18px; }
</style>
</head>
<body>
  <div class="row">
    <div class="field">
      <label class="lbl">— TWIN NAME</label>
      <input value="atlas-04" />
    </div>
    <div class="field">
      <label class="lbl">— REGION</label>
      <input class="focused" value="us-east-1" />
    </div>
  </div>
  <div class="field">
    <label class="lbl">— DESCRIPTION</label>
    <input placeholder="Optional · describe the digital twin's purpose" style="color: var(--fg-muted);" />
  </div>
</body>
</html>
