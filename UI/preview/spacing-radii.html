<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 20px 24px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 50px; background: var(--ink-200); border: 1px solid var(--border-default); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius: 0;"></div><span class="lbl">none · 0</span></div>
    <div class="item"><div class="box" style="border-radius: 2px;"></div><span class="lbl">xs · 2</span></div>
    <div class="item"><div class="box" style="border-radius: 4px;"></div><span class="lbl">sm · 4</span></div>
    <div class="item"><div class="box" style="border-radius: 6px;"></div><span class="lbl">md · 6</span></div>
    <div class="item"><div class="box" style="border-radius: 10px;"></div><span class="lbl">lg · 10</span></div>
    <div class="item"><div class="box" style="border-radius: 14px;"></div><span class="lbl">xl · 14</span></div>
    <div class="item"><div class="box" style="border-radius: 20px;"></div><span class="lbl">2xl · 20</span></div>
    <div class="item"><div class="box" style="border-radius: 999px;"></div><span class="lbl">full</span></div>
  </div>
</body>
</html>
