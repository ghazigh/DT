<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 18px 24px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 9px 18px; border-radius: var(--r-sm); cursor: pointer; border: 1px solid transparent;
    display: inline-flex; align-items: center; gap: 8px; transition: all 120ms;
  }
  .primary { background: var(--signal-500); color: var(--ink-000); font-weight: 600; }
  .primary:hover { background: var(--signal-300); box-shadow: 0 0 24px rgba(0,232,154,0.4); }
  .secondary { background: transparent; color: var(--fg-primary); border-color: var(--border-default); }
  .secondary:hover { border-color: var(--signal-500); color: var(--signal-500); }
  .ghost { background: transparent; color: var(--fg-secondary); }
  .ghost:hover { color: var(--fg-primary); background: var(--ink-200); }
  .danger { background: transparent; color: #ff5a4e; border-color: rgba(255,90,78,0.4); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <button class="btn primary">Deploy twin →</button>
    <button class="btn secondary">Configure</button>
    <button class="btn ghost">Cancel</button>
    <button class="btn danger">Abort run</button>
  </div>
  <div class="lbl">— Primary · Secondary · Ghost · Danger</div>
</body>
</html>
