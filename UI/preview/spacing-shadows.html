<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-app); }
  body { padding: 24px 28px; }
  .row { display: flex; gap: 28px; align-items: center; }
  .card { width: 110px; height: 70px; background: var(--ink-200); border: 1px solid var(--border-subtle); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.08em; }
  .sm { box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  .md { box-shadow: 0 4px 16px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.5); }
  .lg { box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.4); }
  .glow { box-shadow: 0 0 0 1px var(--signal-500), 0 0 32px rgba(0,232,154,0.35); border-color: var(--signal-500); color: var(--signal-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="card sm">— SHADOW SM</div>
    <div class="card md">— SHADOW MD</div>
    <div class="card lg">— SHADOW LG</div>
    <div class="card glow">— GLOW SIGNAL</div>
  </div>
</body>
</html>
